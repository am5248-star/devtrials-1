# Netlify Configuration for Next.js Monorepo

[build]
  command = "npm run build"
  publish = ".next"
  base = "apps/web"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"

[context.production]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }
